# Lint, type-check, and build on every PR and push.
# Gates builder PRs and content changes before merge.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Type-check (astro check)
        run: npm run check

      - name: Validate builder profiles
        run: npm run validate:builders

      - name: Build
        run: npm run build
